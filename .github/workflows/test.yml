name: Test

on:
  # Run after deploy workflow completes (for push to main)
  workflow_run:
    workflows: ["Deploy Testmon Server"]
    types: [completed]
    branches: [main]
  # Run directly for PRs (no deploy needed)
  pull_request:
    branches: [main]
  # Manual trigger
  workflow_dispatch:

env:
  # NetDB configuration - uses the production server
  TESTMON_NET_ENABLED: "true"
  TESTMON_SERVER: "https://ezmon.aloiz.ch"
  TESTMON_AUTH_TOKEN: "ezmon-ci-test-token-2024"

jobs:
  # ============================================================================
  # Unit Tests - Self-hosted macOS runner with NetDB
  # ============================================================================
  unit-tests:
    runs-on: self-hosted
    # Skip if triggered by workflow_run and deploy failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      REPO_ID: ${{ github.repository }}
      JOB_ID: "unit-tests"
      RUN_ID: ${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
          python3 -m pip install pytest pytest-cov pytest-json-report

      - name: Run unit tests with ezmon
        run: |
          python3 -m pytest tests/ -v --ezmon --tb=short --json-report --json-report-file=test-report.json || true
          python3 -c "
          import json, os
          with open('test-report.json') as f:
              report = json.load(f)
          report['commit_id'] = os.environ['GITHUB_SHA']
          report['repo_id'] = os.environ['GITHUB_REPOSITORY']
          with open('test-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          "

      - name: Print test report JSON
        if: always()
        run: cat test-report.json

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.sha }}
          path: test-report.json

  # ============================================================================
  # Integration Tests - Self-hosted macOS runner with NetDB
  # ============================================================================
  integration-tests:
    runs-on: self-hosted
    # Skip if triggered by workflow_run and deploy failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      REPO_ID: ${{ github.repository }}
      JOB_ID: "integration-tests"
      RUN_ID: ${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ezmon
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Run integration tests with ezmon
        run: python3 integration_tests/run_integration_tests.py -v

  # ============================================================================
  # Lint
  # ============================================================================
  lint:
    runs-on: self-hosted
    # Skip if triggered by workflow_run and deploy failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        run: |
          python3 -m pip install flake8
          python3 -m flake8 ezmon/ --max-line-length=120 --ignore=E501,W503 || true
